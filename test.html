<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Testimonial Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    
    body {
        background-color: #050B14;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 20px;
    }

    .testimonial-card {
        width: 100%;
        max-width: 350px;
        background-color: #08101E;
        border: 1px solid #1E293B;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: all 0.3s ease;
    }

    .testimonial-card:hover {
        border-color: #00E6F7;
       
        transform: translateY(-5px);
    }

    .card-top {
        background: linear-gradient(135deg, #0C182C, #132540); 
        height: 120px;
        position: relative;
    }

    .profile-img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid #08101E;
        outline: 2px solid #00E6F7;
        position: absolute;
        bottom: -45px;
        left: 50%;
        transform: translateX(-50%);
        object-fit: cover;
        background-color: #fff;
    }

    .card-body {
        padding: 65px 25px 30px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .quote-icon {
        color: #00E6F7;
        font-size: 24px;
        margin-bottom: 15px;
        opacity: 0.9;
    }

    .testimonial-text {
        font-size: 0.95rem;
        color: #94A3B8;
        line-height: 1.6;
        margin-bottom: 25px;
        font-weight: 300;
    }

    .author-info {
        margin-top: auto;
    }

    .author {
        font-weight: 600;
        font-size: 1rem;
        color: #E0E8F0;
        margin: 0;
        letter-spacing: 0.5px;
    }

    .company {
        display: block;
        font-size: 0.75rem;
        color: #00E6F7;
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>
</head>

<body>

<div class="testimonial-card">
    <div class="card-top">
        <img src="https://randomuser.me/api/portraits/men/32.jpg" class="profile-img" alt="Mike V.">
    </div>

    <div class="card-body">
        <i class="fa-solid fa-quote-left quote-icon"></i>

        <p class="testimonial-text">
            "I believe that one defines oneself by reinvention. To not be like your parents. To not be like your friends. To be yourself. To cut yourself out of stone."
        </p>

        <div class="author-info">
            <h5 class="author">Mike V.</h5>
            <span class="company">Verified Client</span>
        </div>
    </div>
</div>

</body>
</html>
